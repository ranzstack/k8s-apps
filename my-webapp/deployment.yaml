apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-webapp
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-webapp
  template:
    metadata:
      labels:
        app: my-webapp
    spec:
      containers:
        - name: my-webapp
          image: nginxdemos/hello:latest
          ports:
            - containerPort: 80
